<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <h1 class="game-title">Rock Paper Scissors Game</h1>

      <div class="score-board">
        <p>Computer: <span id="computer-score">0</span></p>
        <p>User: <span id="user-score">0</span></p>
      </div>

      <div class="battle-area">
        <div class="player computer">
          <h2>Computer</h2>
          <div id="computer-choice" class="choice-display">🤜🏻</div>
        </div>

        <div class="player user">
          <h2>User</h2>
          <div id="user-choice" class="choice-display">🤛🏻</div>
        </div>
      </div>

      <div class="result" id="result">Make your move!</div>

      <div class="choices">
        <button class="choice-btn" data-choice="rock">✊🏻</button>
        <button class="choice-btn" data-choice="paper">✋🏻</button>
        <button class="choice-btn" data-choice="scissors">✌🏻</button>
      </div>

      <button id="reset-btn">Reset Game</button>
    </div>

    <script src="App.js"></script>
  </body>
</html>
